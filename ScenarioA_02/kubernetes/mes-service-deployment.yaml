---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mes-service-config
  namespace: scenario-a-demo
  labels:
    app: mes-service
    app.kubernetes.io/name: mes-service
    app.kubernetes.io/component: backend
data:
  NODE_ENV: "production"
  PORT: "3002"
  SERVICE_VERSION: "1.0.0"
  DB_HOST: "postgresql.scenario-a-demo.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "production_orders"
  DB_USER: "postgres"
  DB_POOL_MAX: "20"
  DB_IDLE_TIMEOUT: "30000"
  DB_CONNECTION_TIMEOUT: "2000"
  DB_SSL: "false"
  AUTH_ENABLED: "false"
  JWT_ISSUER: "mes-service"
  JWT_AUDIENCE: "mes-api"
  JWT_EXPIRATION: "3600"
  CORS_ORIGIN: "*"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  LOG_LEVEL: "info"
  SIMULATE_LATENCY: "false"
  MIN_LATENCY_MS: "50"
  MAX_LATENCY_MS: "200"
  SIMULATE_ERRORS: "false"
  ERROR_RATE: "0.05"

---
apiVersion: v1
kind: Secret
metadata:
  name: mes-service-secret
  namespace: scenario-a-demo
  labels:
    app: mes-service
type: Opaque
stringData:
  DB_PASSWORD: "postgres123"
  JWT_SECRET: "mes-secret-key-change-in-production"

---
apiVersion: v1
kind: Service
metadata:
  name: mes-service
  namespace: scenario-a-demo
  labels:
    app: mes-service
    app.kubernetes.io/name: mes-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: scenario-a-demo
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3002
      targetPort: 3002
      protocol: TCP
  selector:
    app: mes-service
  sessionAffinity: None

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mes-service
  namespace: scenario-a-demo
  labels:
    app: mes-service
    app.kubernetes.io/name: mes-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: scenario-a-demo
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mes-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: mes-service
        app.kubernetes.io/name: mes-service
        app.kubernetes.io/component: backend
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      serviceAccountName: default
      containers:
        - name: mes-service
          image: mes-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3002
              protocol: TCP
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: mes-service-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: mes-service-config
                  key: PORT
            - name: SERVICE_VERSION
              valueFrom:
                configMapKeyRef:
                  name: mes-service-config
                  key: SERVICE_VERSION
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: mes-service-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: mes-service-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: mes-service-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: mes-service-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mes-service-secret
                  key: DB_PASSWORD
            - name: DB_POOL_MAX
              valueFrom:
                configMapKeyRef:
                  name: mes-service-config
                  key: DB_POOL_MAX
            - name: AUTH_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: mes-service-config
                  key: AUTH_ENABLED
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mes-service-secret
                  key: JWT_SECRET
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: mes-service-config
                  key: LOG_LEVEL
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3002
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mes-service
  namespace: scenario-a-demo
  labels:
    app: mes-service
    app.kubernetes.io/name: mes-service
    app.kubernetes.io/component: backend
spec:
  to:
    kind: Service
    name: mes-service
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mes-service-hpa
  namespace: scenario-a-demo
  labels:
    app: mes-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mes-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

