---
# IBM App Connect Enterprise Server Configuration
# Version: 13.0.1
# Environment: OpenShift / Cloud Pak for Integration

ServerConf:
  serverName: 'OrderOrchestrationServer'
  
  # HTTP Listener Configuration
  HTTPListener:
    port: 7800
    host: '0.0.0.0'
    corsEnabled: true
    corsAllowOrigins: '*'
    corsAllowMethods: 'GET,POST,PUT,DELETE,OPTIONS'
    corsAllowHeaders: 'Content-Type,Authorization,X-Request-ID'
    
  # HTTPS Listener (for production)
  HTTPSListener:
    port: 7843
    host: '0.0.0.0'
    keystoreFile: '/home/aceuser/keystores/server.jks'
    keystorePassword: '{encrypted}changeit'
    keystoreType: 'JKS'
    
  # Resource Managers
  ResourceManagers:
    HTTPConnector:
      policies:
        - BackendHTTPPolicy
      connectionPoolSize: 100
      maxConnectionsPerRoute: 20
      
    JMS:
      # Non utilizzato in questo scenario
      enabled: false
      
  # Environment Variables
  Environment:
    Variables:
      # Backend Service URLs
      ERP_SERVICE_URL: 'http://erp-service.scenario-a-demo.svc.cluster.local:3001'
      MES_SERVICE_URL: 'http://mes-service.scenario-a-demo.svc.cluster.local:3002'
      QMS_SERVICE_URL: 'http://qms-service.scenario-a-demo.svc.cluster.local:3003'
      
      # Retry Configuration
      MAX_RETRIES: 3
      RETRY_INITIAL_DELAY_MS: 1000
      RETRY_BACKOFF_MULTIPLIER: 2.0
      HTTP_TIMEOUT_SECONDS: 30
      
      # Circuit Breaker Configuration
      CIRCUIT_BREAKER_THRESHOLD: 5
      CIRCUIT_BREAKER_TIMEOUT_SECONDS: 60
      
      # OAuth2 Configuration
      OAUTH2_ENABLED: 'false'
      OAUTH2_TOKEN_ENDPOINT: 'https://oauth-server/token'
      OAUTH2_CLIENT_ID: 'ace-integration-client'
      OAUTH2_CLIENT_SECRET: '{encrypted}secret'
      
      # Feature Flags
      ENABLE_PARTIAL_RESPONSES: 'true'
      ENABLE_CIRCUIT_BREAKER: 'true'
      ENABLE_DISTRIBUTED_TRACING: 'true'
      
  # Logging Configuration
  Logging:
    consoleLog: true
    consoleFormat: 'json'
    consoleLogLevel: 'info'
    fileLog: false
    
    # Structured logging fields
    outputFormat: 'json'
    includeFields:
      - timestamp
      - level
      - message
      - threadId
      - messageFlowName
      - nodeLabel
      - exceptionText
      
  # Monitoring and Metrics
  Monitoring:
    MessageFlow:
      publicationOn: 'active'
      
    Resource:
      reportingOn: true
      
  # Statistics
  Statistics:
    Snapshot:
      publicationOn: 'active'
      nodeDataLevel: 'basic'
      threadDataLevel: 'none'
      outputFormat: 'json'
      
    Archive:
      archivalOn: false
      
  # Tracing (OpenTelemetry)
  Tracing:
    enabled: true
    endpoint: 'http://jaeger-collector.observability.svc.cluster.local:14268/api/traces'
    serviceName: 'order-orchestration-service'
    samplingRate: 1.0
    
  # Security
  Security:
    # TLS Configuration
    TLS:
      enabled: true
      minVersion: 'TLSv1.2'
      cipherSuites:
        - 'TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384'
        - 'TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256'
        
    # Authentication
    Authentication:
      type: 'none'  # Gestito da API Connect
      
  # Performance Tuning
  Performance:
    # Thread Pool
    ThreadPool:
      minThreads: 10
      maxThreads: 100
      threadIncrement: 10
      
    # Memory
    Memory:
      heapSize: '1024m'
      maxHeapSize: '2048m'
      
    # Message Processing
    MessageProcessing:
      maxMessageSize: '10485760'  # 10MB
      
  # Workload Management
  WorkloadManagement:
    enabled: false
    
  # Admin REST API
  AdminRestApi:
    enabled: true
    port: 7600
    host: '0.0.0.0'
    corsEnabled: true
    
  # User Exits
  UserExits:
    activeUserExitList: ''
    userExitPath: '/home/aceuser/ace-server/exits'
    
  # Policies
  Policies:
    policyProjectName: 'OrderOrchestrationPolicies'
    
  # Deployment
  Deployment:
    # BAR file overrides
    overrides:
      - property: 'ERP_SERVICE_URL'
        value: '${ERP_SERVICE_URL}'
      - property: 'MES_SERVICE_URL'
        value: '${MES_SERVICE_URL}'
      - property: 'QMS_SERVICE_URL'
        value: '${QMS_SERVICE_URL}'

# Made with Bob
